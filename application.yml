server:
  port: 8071

spring:
  application:
    name: config-server
  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/Hamedmiri72/axiomArch_configuration.git"
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true

encrypt:
  key: ${ENCRYPT_KEY:development-fallback-secret-key-32chars}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,refresh"
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true